name: Build PoleBrowse CEF

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps (CEF on Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libgdk-pixbuf2.0-dev libpango1.0-dev \
            libcairo2-dev libatk1.0-dev libgdk-pixbuf-2.0-dev \
            libx11-dev libxcomposite-dev libxdamage-dev libxrandr-dev \
            libxtst-dev libxss-dev libdbus-1-dev libdrm-dev \
            libgbm-dev libpulse-dev libasound2-dev

      - name: Cache CEF binaries
        uses: actions/cache@v4
        with:
          path: ~/.local/share/cef
          key: ${{ runner.os }}-cef-${{ hashFiles('browser/Cargo.toml') }}

      - name: Pre-download CEF binaries (optional)
        continue-on-error: true
        run: |
          export CEF_PATH="$HOME/.local/share/cef"
          mkdir -p "$CEF_PATH"
          cargo run -p download-cef -- --dir "$CEF_PATH" 2>/dev/null || true

      - name: Build
        run: cargo build --release --manifest-path browser/Cargo.toml
        env:
          CEF_PATH: ${{ runner.temp }}/cef

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: PoleBrowse-Linux
          path: browser/target/release/polebrowse

  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache CEF binaries
        uses: actions/cache@v4
        with:
          path: ~/.local/share/cef
          key: ${{ runner.os }}-cef-${{ hashFiles('browser/Cargo.toml') }}

      - name: Build
        run: cargo build --release --manifest-path browser/Cargo.toml
        env:
          CEF_PATH: ${{ runner.temp }}/cef

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: PoleBrowse-Windows
          path: browser/target/release/polebrowse.exe
