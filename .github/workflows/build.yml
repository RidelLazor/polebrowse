name: Build PoleBrowse CEF

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 3

jobs:
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps (CEF on Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libgdk-pixbuf2.0-dev libpango1.0-dev \
            libcairo2-dev libatk1.0-dev \
            libx11-dev libxcomposite-dev libxdamage-dev libxrandr-dev \
            libxtst-dev libxss-dev libdbus-1-dev libdrm-dev \
            libgbm-dev libpulse-dev libasound2-dev \
            cmake ninja-build

      - name: Build
        run: cargo build --release --manifest-path browser/Cargo.toml

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: PoleBrowse-Linux
          path: browser/target/release/polebrowse

  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release --manifest-path browser/Cargo.toml

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: PoleBrowse-Windows
          path: browser/target/release/polebrowse.exe
