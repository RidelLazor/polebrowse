name: Build PoleBrowse CEF

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 3

jobs:
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps (CEF on Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libgdk-pixbuf2.0-dev libpango1.0-dev \
            libcairo2-dev libatk1.0-dev \
            libx11-dev libxcomposite-dev libxdamage-dev libxrandr-dev \
            libxtst-dev libxss-dev libdbus-1-dev libdrm-dev \
            libgbm-dev libpulse-dev libasound2-dev \
            cmake ninja-build

      - name: Build
        run: cargo build --release --manifest-path browser/Cargo.toml

      - name: Locate CEF build output
        id: cef_path
        run: |
          CEF_DIR=$(find browser/target/release/build -name "libcef.so" -exec dirname {} \; | head -n 1)
          echo "cef_release=$CEF_DIR" >> $GITHUB_OUTPUT
          # parent of Release dir is the CEF binary distribution root
          CEF_ROOT=$(dirname "$CEF_DIR")
          echo "cef_root=$CEF_ROOT" >> $GITHUB_OUTPUT

      - name: Bundle release
        run: |
          mkdir -p target/bundle
          cp browser/target/release/polebrowse target/bundle/
          CEF_RELEASE="${{ steps.cef_path.outputs.cef_release }}"
          if [ -n "$CEF_RELEASE" ]; then
            cp -r "$CEF_RELEASE"/* target/bundle/
          fi
          CEF_ROOT="${{ steps.cef_path.outputs.cef_root }}"
          if [ -n "$CEF_ROOT" ] && [ -d "$CEF_ROOT/Resources" ]; then
            cp -r "$CEF_ROOT/Resources" target/bundle/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PoleBrowse-Linux
          path: target/bundle/

  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release --manifest-path browser/Cargo.toml

      - name: Locate CEF build output
        id: cef_path
        shell: pwsh
        run: |
          $CEF_DLL = Get-ChildItem -Path browser\target\release\build -Recurse -Filter "libcef.dll" | Select-Object -First 1
          $CEF_DIR = $CEF_DLL.DirectoryName
          Write-Output "cef_release=$CEF_DIR" >> $env:GITHUB_OUTPUT
          $CEF_ROOT = (Get-Item $CEF_DIR).Parent.FullName
          Write-Output "cef_root=$CEF_ROOT" >> $env:GITHUB_OUTPUT

      - name: Bundle release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path target\bundle
          Copy-Item browser\target\release\polebrowse.exe -Destination target\bundle\
          $CEF_RELEASE = "${{ steps.cef_path.outputs.cef_release }}"
          if ($CEF_RELEASE) {
            Copy-Item "$CEF_RELEASE\*" -Destination target\bundle\ -Recurse -Force
          }
          $CEF_ROOT = "${{ steps.cef_path.outputs.cef_root }}"
          if ($CEF_ROOT -and (Test-Path "$CEF_ROOT\Resources")) {
            Copy-Item "$CEF_ROOT\Resources" -Destination target\bundle\ -Recurse -Force
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PoleBrowse-Windows
          path: target\bundle\
