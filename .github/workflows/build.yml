name: Build PoleBrowse CEF

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 3

jobs:
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps (CEF on Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libgdk-pixbuf2.0-dev libpango1.0-dev \
            libcairo2-dev libatk1.0-dev \
            libx11-dev libxcomposite-dev libxdamage-dev libxrandr-dev \
            libxtst-dev libxss-dev libdbus-1-dev libdrm-dev \
            libgbm-dev libpulse-dev libasound2-dev \
            cmake ninja-build

      - name: Build
        run: cargo build --release --manifest-path browser/Cargo.toml

      - name: Locate CEF build output
        id: cef_path
        run: |
          CEF_DIR=$(find browser/target/release/build -name "libcef.so" -exec dirname {} \; | head -n 1)
          echo "cef_release=$CEF_DIR" >> $GITHUB_OUTPUT

      - name: Bundle release
        run: |
          mkdir -p target/bundle/Resources

          # binary
          cp browser/target/release/polebrowse target/bundle/

          CEF_DIR="${{ steps.cef_path.outputs.cef_release }}"
          if [ -z "$CEF_DIR" ]; then
            echo "WARNING: CEF_DIR not found, skipping CEF runtime bundle"
            exit 0
          fi

          # shared libs alongside the binary
          cp "$CEF_DIR"/lib*.so*   target/bundle/ 2>/dev/null || true
          cp "$CEF_DIR"/chrome-sandbox target/bundle/ 2>/dev/null || true
          cp "$CEF_DIR"/*.bin      target/bundle/ 2>/dev/null || true
          cp "$CEF_DIR"/*.json     target/bundle/ 2>/dev/null || true

          # Resources — handle both nested (Release+Resources siblings) and flat layouts
          PARENT=$(dirname "$CEF_DIR")
          if [ -d "$PARENT/Resources" ]; then
            # Standard CEF layout: cef_binary_X/Release + cef_binary_X/Resources
            cp -r "$PARENT/Resources"/* target/bundle/Resources/
          elif ls "$CEF_DIR"/*.pak >/dev/null 2>&1; then
            # Flat layout: everything in one directory
            cp "$CEF_DIR"/*.pak      target/bundle/Resources/ 2>/dev/null || true
            cp "$CEF_DIR"/icudtl.dat target/bundle/Resources/ 2>/dev/null || true
            if [ -d "$CEF_DIR/locales" ]; then
              cp -r "$CEF_DIR/locales" target/bundle/Resources/
            fi
          else
            echo "WARNING: no CEF Resources found"
          fi

  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release --manifest-path browser/Cargo.toml

      - name: Locate CEF build output
        id: cef_path
        shell: pwsh
        run: |
          $CEF_DLL = Get-ChildItem -Path browser\target\release\build -Recurse -Filter "libcef.dll" | Select-Object -First 1
          $CEF_DIR = $CEF_DLL.DirectoryName
          Write-Output "cef_release=$CEF_DIR" >> $env:GITHUB_OUTPUT

      - name: Bundle release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path target\bundle\Resources
          Copy-Item browser\target\release\polebrowse.exe -Destination target\bundle\

          $CEF_DIR = "${{ steps.cef_path.outputs.cef_release }}"
          if (-not $CEF_DIR) {
            Write-Output "WARNING: CEF_DIR not found, skipping CEF runtime bundle"
            exit 0
          }

          # shared libs alongside the binary
          Copy-Item "$CEF_DIR\*.dll" -Destination target\bundle\ -Force
          Copy-Item "$CEF_DIR\chrome-sandbox.exe" -Destination target\bundle\ -Force -ErrorAction SilentlyContinue
          Copy-Item "$CEF_DIR\*.bin" -Destination target\bundle\ -Force
          Copy-Item "$CEF_DIR\*.json" -Destination target\bundle\ -Force

          # Resources — handle both nested (Release+Resources siblings) and flat layouts
          $PARENT = (Get-Item $CEF_DIR).Parent.FullName
          if (Test-Path "$PARENT\Resources") {
            # Standard CEF layout
            Copy-Item "$PARENT\Resources\*" -Destination target\bundle\Resources\ -Recurse -Force
          } elseif (Test-Path "$CEF_DIR\*.pak") {
            # Flat layout
            Copy-Item "$CEF_DIR\*.pak" -Destination target\bundle\Resources\ -Force
            Copy-Item "$CEF_DIR\icudtl.dat" -Destination target\bundle\Resources\ -Force -ErrorAction SilentlyContinue
            if (Test-Path "$CEF_DIR\locales") {
              Copy-Item "$CEF_DIR\locales" -Destination target\bundle\Resources\ -Recurse -Force
            }
          } else {
            Write-Output "WARNING: no CEF Resources found"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PoleBrowse-Windows
          path: target\bundle\
