name: Release Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libnss3-dev libatk1.0-dev libdbus-1-dev binutils

      - name: Cache Cargo Registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Browser
        run: |
          cd browser
          cargo build --release
          # Strip symbols to keep the binary small
          strip target/release/polebrowse

      - name: Create AppImage
        run: |
          # Create a directory structure for AppImage
          mkdir -p polebrowse.AppDir/usr/bin
          mkdir -p polebrowse.AppDir/usr/share/icons/hicolor/256x256/apps
          
          # Copy binary and resources
          cp browser/target/release/polebrowse polebrowse.AppDir/usr/bin/
          cp -r browser/target/release/Resources polebrowse.AppDir/usr/bin/
          cp -r browser/target/release/www polebrowse.AppDir/usr/bin/
          cp src/assets/pb-logo-256.png polebrowse.AppDir/usr/share/icons/hicolor/256x256/apps/polebrowse.png
          cp src/assets/pb-logo-256.png polebrowse.AppDir/polebrowse.png
          cp polebrowse.desktop polebrowse.AppDir/
          
          # Create simple AppRun script
          echo '#!/bin/sh' > polebrowse.AppDir/AppRun
          echo 'cd "$(dirname "$0")/usr/bin"' >> polebrowse.AppDir/AppRun
          echo './polebrowse' >> polebrowse.AppDir/AppRun
          chmod +x polebrowse.AppDir/AppRun
          
          # Download and run appimagetool to package
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage --appimage-extract
          ./squashfs-root/AppRun polebrowse.AppDir PoleBrowse.AppImage

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: polebrowse-linux-appimage
          path: PoleBrowse.AppImage
