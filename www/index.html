<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PoleBrowse</title>
<style>
:root {
  --bg: #202124;
  --tabbar: #202124;
  --tab-active: #35363a;
  --tab-inactive: transparent;
  --navbar: #35363a;
  --omnibox: #202124;
  --text: #ffffff;
  --muted: #9aa0a6;
  --border: #3c4043;
  --accent: #8ab4f8;
  --ff: 'Segoe UI', Tahoma, sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: var(--ff); background: var(--bg); display: flex; flex-direction: column; }

/* ── TITLEBAR & TABS ── */
#titlebar { 
  height: 40px; 
  background: var(--tabbar); 
  display: flex; 
  align-items: flex-end; 
  padding: 0 10px;
  user-select: none;
  -webkit-app-region: drag;
}
#tabs-wrap { 
  display: flex; 
  align-items: flex-end; 
  height: 34px; 
  flex: 1; 
  gap: 0; 
  padding-left: 8px;
  -webkit-app-region: no-drag;
}

.tab { 
  height: 32px; 
  min-width: 160px; 
  max-width: 240px; 
  display: flex; 
  align-items: center; 
  padding: 0 12px 0 16px; 
  color: var(--muted); 
  font-size: 12px; 
  cursor: pointer; 
  position: relative;
  z-index: 1;
  border-radius: 8px 8px 0 0;
  transition: background 0.2s, color 0.2s;
  animation: tab-pop 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.tab.active { 
  background: var(--navbar);
  color: var(--text); 
  z-index: 10;
}

/* Chrome "Flairs" - The bottom curves */
.tab.active::before,
.tab.active::after {
  content: "";
  position: absolute;
  bottom: 0;
  width: 16px;
  height: 16px;
  background: transparent;
  pointer-events: none;
}
.tab.active::before {
  left: -16px;
  border-bottom-right-radius: 16px;
  box-shadow: 5px 0 0 0 var(--navbar);
}
.tab.active::after {
  right: -16px;
  border-bottom-left-radius: 16px;
  box-shadow: -5px 0 0 0 var(--navbar);
}

.tab:not(.active):hover {
  background: rgba(255,255,255,0.06);
  color: var(--text);
}

/* Tab Separator */
.tab:not(.active):not(:hover) + .tab:not(.active):not(:hover)::after {
  content: "";
  position: absolute;
  left: 0;
  top: 8px;
  bottom: 8px;
  width: 1px;
  background: var(--border);
}

.tab-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 8px; }
.tab-x { 
  width: 18px; height: 18px; border-radius: 50%; border: none; background: transparent; 
  color: var(--muted); font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, color 0.2s;
}
.tab-x:hover { background: rgba(255,255,255,0.15); color: var(--text); }

#btn-newtab { 
  width: 28px; height: 28px; border-radius: 50%; border: none; background: transparent; 
  color: var(--muted); cursor: pointer; font-size: 20px; display: flex; align-items: center; 
  justify-content: center; margin: 0 8px 6px 16px;
  transition: background 0.2s, color 0.2s;
  -webkit-app-region: no-drag;
}
#btn-newtab:hover { background: rgba(255,255,255,0.1); color: var(--text); }

/* ── PROGRESS BAR ── */
#progress-bar {
  position: absolute;
  top: 88px; /* bottom of navbar */
  left: 0;
  width: 0;
  height: 2px;
  background: var(--accent);
  z-index: 100;
  transition: width 0.3s ease-out, opacity 0.3s;
  box-shadow: 0 0 8px var(--accent);
}

/* ── NAVBAR ── */
#navbar { 
  height: 48px; 
  background: var(--navbar); 
  display: flex; 
  align-items: center; 
  padding: 0 8px; 
  gap: 4px; 
  border-bottom: 1px solid var(--border);
}

.nbtn { 
  width: 32px; height: 32px; border-radius: 50%; border: none; background: transparent; 
  color: var(--text); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.nbtn:hover { background: rgba(255,255,255,0.1); }
.nbtn:active { transform: scale(0.95); }

#urlbar-wrap { 
  flex: 1; height: 34px; background: var(--omnibox); border-radius: 17px; 
  display: flex; align-items: center; padding: 0 16px; margin: 0 8px;
  border: 1px solid transparent; transition: box-shadow 0.2s, background 0.2s, border-color 0.2s;
}
#urlbar-wrap:focus-within { 
  background: #28292c; 
  border-color: var(--accent); 
  box-shadow: 0 0 0 2px rgba(138, 180, 248, 0.3); 
}

#urlbar { 
  flex: 1; background: transparent; border: none; outline: none; 
  color: var(--text); font-size: 14px; margin-left: 10px;
}

/* ── MENU DROPDOWN ── */
#menu-dropdown {
  position: absolute;
  top: 86px;
  right: 12px;
  width: 240px;
  background: #2d2e31;
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  display: none;
  flex-direction: column;
  padding: 8px 0;
  z-index: 1000;
  animation: menu-show 0.15s ease-out;
}

@keyframes menu-show {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.menu-item {
  padding: 10px 20px;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
}

.menu-item:hover {
  background: rgba(255,255,255,0.08);
}

.menu-divider {
  height: 1px;
  background: var(--border);
  margin: 8px 0;
}

</style>
</head>
<body>

<div id="titlebar">
  <div id="tabs-wrap"></div>
  <button id="btn-newtab" title="New Tab">+</button>
</div>

<div id="navbar">
  <button class="nbtn" id="btn-back">←</button>
  <button class="nbtn" id="btn-fwd">→</button>
  <button class="nbtn" id="btn-reload">↻</button>
  <div id="urlbar-wrap">
    <div style="font-size:14px; opacity:0.6;">🔒</div>
    <input id="urlbar" type="text" placeholder="Search Google or type a URL" spellcheck="false"/>
  </div>
  <button class="nbtn" id="btn-menu">⋮</button>
</div>

<!-- ── MENU DROPDOWN ── -->
<div id="menu-dropdown">
  <div class="menu-item" onclick="pb.newTab(); hideMenu();">New Tab <span style="margin-left:auto; opacity:0.5; font-size:10px;">Ctrl+T</span></div>
  <div class="menu-divider"></div>
  <div class="menu-item" onclick="pb.navigate('https://google.com'); hideMenu();">History</div>
  <div class="menu-item" onclick="pb.navigate('https://google.com'); hideMenu();">Downloads</div>
  <div class="menu-item" onclick="pb.navigate('https://google.com'); hideMenu();">Bookmarks</div>
  <div class="menu-divider"></div>
  <div class="menu-item" onclick="pb.navigate('ridell://settings'); hideMenu();">Settings</div>
  <div class="menu-item" onclick="pb.navigate('about:blank'); hideMenu();">About PoleBrowse</div>
  <div class="menu-divider"></div>
  <div class="menu-item" style="color:#ff6b6b;" onclick="window.close();">Exit</div>
</div>

<div id="progress-bar"></div>

<script>
// Actual IPC bridge to Rust/CEF
const ipc = (cmd, data = '') => {
  if (window.__polebrowse_ipc) {
    window.__polebrowse_ipc(data ? `${cmd}|${data}` : cmd);
  } else {
    console.warn('IPC not available:', cmd, data);
  }
};

const pb = {
  navigate: (url) => {
    if (!url.includes('://')) url = 'https://' + url;
    document.getElementById('urlbar').value = url;
    ipc('navigate', url);
    
    // Animate progress bar
    const pb_el = document.getElementById('progress-bar');
    pb_el.style.width = '30%';
    pb_el.style.opacity = '1';
    
    // Update tab title immediately (heuristic)
    const activeTab = tabs.find(t => t.active);
    if (activeTab) {
      activeTab.title = url.replace(/^https?:\/\//, '').split('/')[0];
      renderTabs();
    }
    
    // Finish animation after a delay (simulated)
    setTimeout(() => {
      pb_el.style.width = '100%';
      setTimeout(() => { pb_el.style.opacity = '0'; setTimeout(() => pb_el.style.width = '0', 300); }, 200);
    }, 1000);
  },
  newTab: () => {
    const id = Date.now();
    tabs.forEach(t => t.active = false);
    tabs.push({ id, title: 'New Tab', active: true });
    document.getElementById('urlbar').value = '';
    renderTabs();
    ipc('navigate', 'https://www.google.com');
  },
  goBack: () => ipc('goBack'),
  goForward: () => ipc('goForward'),
  reload: () => ipc('reload'),
  toggleMenu: () => {
    const menu = document.getElementById('menu-dropdown');
    menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
  }
};

function hideMenu() {
  document.getElementById('menu-dropdown').style.display = 'none';
}

// Close menu when clicking outside
window.addEventListener('click', (e) => {
  if (!e.target.closest('#btn-menu') && !e.target.closest('#menu-dropdown')) {
    hideMenu();
  }
});

let tabs = [{ id: 1, title: 'Google', active: true }];

function renderTabs() {
  const wrap = document.getElementById('tabs-wrap');
  wrap.innerHTML = '';
  tabs.forEach(t => {
    const el = document.createElement('div');
    el.className = 'tab' + (t.active ? ' active' : '');
    el.innerHTML = `
      <span class="tab-title">${t.title}</span>
      <button class="tab-x">✕</button>
    `;
    el.onclick = () => {
      tabs.forEach(tab => tab.active = false);
      t.active = true;
      renderTabs();
    };
    wrap.appendChild(el);
  });
}

document.getElementById('urlbar').onkeydown = (e) => {
  if (e.key === 'Enter') {
    pb.navigate(e.target.value.trim());
  }
};

document.getElementById('btn-back').onclick = () => pb.goBack();
document.getElementById('btn-fwd').onclick = () => pb.goForward();
document.getElementById('btn-reload').onclick = () => pb.reload();
document.getElementById('btn-newtab').onclick = () => pb.newTab();
document.getElementById('btn-menu').onclick = (e) => {
  e.stopPropagation();
  pb.toggleMenu();
};

// Initial state
document.getElementById('urlbar').value = 'https://www.google.com';
renderTabs();
</script>
</body>
</html>
